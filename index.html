<style>
  *{margin:0;padding:0;box-sizing:border-box}

  .hotspot{

  .hotspot--c10{left:8%;width:84%;top:87%;height:10%;}

  /* 追従する購入ボタン */
  .sticky-cta{
    position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(120%);
    width:min(440px,92vw);z-index:50;line-height:normal;transition:transform .35s ease;
  }
  .sticky-cta.is-visible{transform:translateX(-50%) translateY(0);}
  .sticky-cta a{
    display:block;text-align:center;text-decoration:none;padding:16px 20px;
    font-size:17px;letter-spacing:.08em;color:#1a1407;
    background:linear-gradient(180deg,#e7cd97,#c8a45e);
    border:1px solid #f0dcae;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.45);
  }
  .sticky-cta a:active{filter:brightness(.95)}
  footer{
    max-width:600px;margin:0 auto;padding:28px 20px 110px;text-align:center;
    font-size:11px;line-height:1.9;color:#8c867a;letter-spacing:.05em;
  }
  footer a{color:#b9a878;text-decoration:none}
</style>
</head>
<body>

  <main class="lp">

    <a href="#">特定商取引法に基づく表記</a> ／ <a href="#">お問い合わせ</a>

<script>
  // ▼ 購入リンク先
  var PURCHASE_URL = "https://dream8store.official.ec/items/94220281";
  var PURCHASE_TARGET = "_blank";

  document.querySelectorAll('a.cta').forEach(function(el){
    el.href = PURCHASE_URL; el.target = PURCHASE_TARGET; el.rel = "noopener noreferrer";
  });

  var sticky = document.getElementById('stickyCta');
  function onScroll(){
    if(window.scrollY > 400){ sticky.classList.add('is-visible'); }
    else{ sticky.classList.remove('is-visible'); }
  }
  window.addEventListener('scroll', onScroll, {passive:true});
  onScroll();
</script>
